backend:
  name: git-gateway
  branch: main

media_folder: "src/images"
public_folder: "/images"

site_url: https://sidemountauthority.com
display_url: https://sidemountauthority.com

collections:

  # ──────────────────────────────────────────────
  # ARTICLES (blog posts)
  # ──────────────────────────────────────────────
  - name: "posts"
    label: "Articles"
    label_singular: "Article"
    folder: "src/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "/articles/{{slug}}/"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Hero Image", name: "hero_image", widget: "image", required: false }
      - { label: "Hero Image Alt Text", name: "hero_image_alt", widget: "string", required: false }
      - { label: "Read Time (minutes)", name: "readTime", widget: "number", required: false, value_type: "int" }
      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        default: "gear"
        options:
          - { label: "Gear", value: "gear" }
          - { label: "Safety & Standards", value: "safety" }
          - { label: "Industry", value: "industry" }
          - { label: "Training", value: "training" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        default: ["posts"]
      - { label: "Body", name: "body", widget: "markdown" }

  # ──────────────────────────────────────────────
  # COURSES (individual files)
  # ──────────────────────────────────────────────
  - name: "courses"
    label: "Training Courses"
    label_singular: "Course"
    folder: "src/courses"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "ID (no spaces, use hyphens)", name: "id", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Duration", name: "duration", widget: "string", hint: "e.g. 2–3 days" }
      - { label: "Price / Investment", name: "price", widget: "string", hint: "e.g. POA or £450" }
      - { label: "Card Image", name: "image", widget: "image" }
      - { label: "Image Alt Text", name: "image_alt", widget: "string" }
      - { label: "Display Order", name: "order", widget: "number", value_type: "int", default: 99 }

  # ──────────────────────────────────────────────
  # INSTRUCTORS (individual files)
  # ──────────────────────────────────────────────
  - name: "instructors"
    label: "Recommended Instructors"
    label_singular: "Instructor"
    folder: "src/instructors"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Agency", name: "agency", widget: "string", default: "RAID" }
      - { label: "Notes", name: "notes", widget: "text", required: false }

  # ──────────────────────────────────────────────
  # HOME PAGE
  # ──────────────────────────────────────────────
  # ──────────────────────────────────────────────
  # HOME PAGE
  # ──────────────────────────────────────────────
  - name: "home"
    label: "Home Page"
    files:
      - name: "home"
        label: "Home Page Content"
        file: "src/_data/home.json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Hero Brand Mark Image", name: "image", widget: "image" }
              - { label: "Hero Image Alt", name: "image_alt", widget: "string" }
          - label: "Pillars (Three Cards)"
            name: "pillars"
            widget: "list"
            min: 3
            max: 3
            fields:
              - { label: "Icon Character", name: "icon", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
          - label: "Photo Band"
            name: "photo_band"
            widget: "object"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt", name: "image_alt", widget: "string" }
              - { label: "Quote", name: "quote", widget: "string" }
              - { label: "Coordinates Left", name: "coord_left", widget: "string" }
              - { label: "Coordinates Right", name: "coord_right", widget: "string" }
          - label: "Currently"
            name: "currently"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string", default: "Currently" }
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Link Text", name: "link_text", widget: "string", required: false }
              - { label: "Link URL", name: "link_url", widget: "string", required: false }
          - label: "Featured Tips Section"
            name: "featured_tips"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Subheading", name: "subheading", widget: "string" }
          - label: "CTA Band"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string" }
              - { label: "Body", name: "body", widget: "text" }
              - { label: "Primary Button Text", name: "button_text", widget: "string" }
              - { label: "Primary Button URL", name: "button_url", widget: "string" }
              - { label: "Secondary Button Text", name: "secondary_text", widget: "string" }
              - { label: "Secondary Button URL", name: "secondary_url", widget: "string" }
  # ──────────────────────────────────────────────
  # SITE SETTINGS
  # ──────────────────────────────────────────────
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "Global Settings"
        file: "src/_data/site.json"
        fields:
          - { label: "Site Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Site URL", name: "url", widget: "string" }
          - { label: "Meta Description", name: "description", widget: "text" }
          - { label: "Contact Email", name: "email", widget: "string" }
          - { label: "YouTube URL", name: "youtube", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string" }

  # ──────────────────────────────────────────────
  # CREDENTIALS (About page)
  # ──────────────────────────────────────────────
  - name: "about"
    label: "About Page"
    files:
      - name: "credentials"
        label: "Credentials"
        file: "src/_data/credentials.json"
        fields:
          - label: "Credentials"
            name: "credentials"
            widget: "list"
            fields:
              - { label: "Agency", name: "agency", widget: "string" }
              - { label: "Credential / Title", name: "credential", widget: "string" }
              - { label: "Detail", name: "detail", widget: "text" }
